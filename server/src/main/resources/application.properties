spring.application.name=summs

# --- MySQL Datasource ---
spring.datasource.url=jdbc:mysql://localhost:3306/summs_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password

# JPA/Hibernate (optional; helpful in dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true